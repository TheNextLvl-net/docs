services:
  docs:
    image: ghcr.io/thenextlvl-net/docs:latest
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    networks:
      - cloudflared
    healthcheck:
      test: ["CMD", "bun", "-e", "await fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) })"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  cloudflared:
    external: true
