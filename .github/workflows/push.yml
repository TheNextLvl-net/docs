name: Push

on:
  push:
    branches: [ main ]

concurrency:
  group: push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/thenextlvl-net/docs:latest
          build-args: |
            PAT_GITHUB=${{ secrets.PAT_GITHUB }}
            FASTSTATS_UPLOAD_TOKEN=${{ secrets.FASTSTATS_UPLOAD_TOKEN }}
            VITE_PUBLIC_BASE_URL=https://thenextlvl.net
            VITE_FASTSTATS_SCRIPT_URL=https://faststats.dev/script.js
            VITE_FASTSTATS_SITEKEY=afe13ffcfce9ea60d8fc944b903cd605
            GITHUB_REF_NAME=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max